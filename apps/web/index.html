<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- PWA: installable to a phone/desktop home screen (see REMOTE.md for how to reach a host from mobile).
         Status-bar style `default` (with the default viewport-fit) keeps iOS standalone inset to the safe
         area, so the header and bottom composer are never hidden under the notch or home indicator. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#fcfcfc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0e0e" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Synara" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Synara</title>
    <style>
      /* Boot splash — shown while the JS bundle is parsing and React mounts.
         React's createRoot(...).render(...) wipes #root's children, so no teardown needed. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        /* Prevent a white flash before the app's own styles load. */
        color-scheme: light dark;
      }
      #root {
        min-height: 100vh;
      }
      .app-boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-app-region: drag;
        pointer-events: none;
      }
      .app-boot-splash__icon {
        width: 112px;
        height: 112px;
        opacity: 0;
        transform: scale(0.96);
        animation:
          app-boot-splash-in 420ms ease-out forwards,
          app-boot-splash-pulse 2.4s ease-in-out 420ms infinite;
      }
      @keyframes app-boot-splash-in {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes app-boot-splash-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.98);
          opacity: 0.85;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot-splash__icon {
          animation: app-boot-splash-in 200ms ease-out forwards;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot-splash" aria-hidden="true">
        <img class="app-boot-splash__icon" src="/synara-logo.svg" alt="" draggable="false" />
      </div>
    </div>
    <script type="module" src="/src/bootstrap.ts"></script>
  </body>
</html>
